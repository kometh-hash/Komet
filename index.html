<header class="header">
  <img src="/path/to/your/logo.png" alt="Company Logo" style="height: 40px; object-fit: contain;" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<span>ไม่พบรูปภาพโลโก้</span>');" />
</header>

<div class="modal-body" style="max-height: 70vh; overflow-y: auto; padding-bottom: 20px;">
  
  <div class="form-group">
    <label>ชื่อผู้รับของ / ผู้เบิกสินค้า</label>
    <input type="text" id="receiverName" placeholder="ระบุชื่อผู้ที่มารับของ..." class="form-control" />
  </div>

  <div class="form-group" style="margin-top: 15px;">
    <label>หน่วยงาน</label>
    <input type="text" id="department" placeholder="ระบุหน่วยงาน..." class="form-control" />
  </div>

  <div class="form-group" style="margin-top: 15px;">
    <label>ลายเซ็นผู้รับของ (ใช้นิ้วเขียน)</label>
    <canvas id="signaturePad" width="300" height="150" style="border: 1px solid #ccc; border-radius: 8px; touch-action: none; background-color: #fff;"></canvas>
    <div style="text-align: right; margin-top: 5px;">
      <button type="button" onclick="clearSignature()" style="color: red; border: none; background: none;">ล้างลายเซ็น</button>
    </div>
  </div>

</div>

<button type="button" onclick="submitData()" class="btn-submit" style="background-color: #28a745; color: white; width: 100%; padding: 15px; border-radius: 8px; margin-top: 10px;">
  ยืนยันการเบิกสินค้า
</button>
